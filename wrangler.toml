# ── FIRST DEPLOY CHECKLIST ──────────────────────────────────────
# 1. Set secrets (all required before deploy):
#    npx wrangler secret put ANTHROPIC_API_KEY
#    npx wrangler secret put SUPABASE_URL
#    npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#
# 2. Optional (Stripe — set when ready):
#    npx wrangler secret put STRIPE_SECRET_KEY
#    npx wrangler secret put STRIPE_WEBHOOK_SECRET
#
# 3. Deploy:
#    npx wrangler deploy
#
# 4. Copy Worker URL from deploy output
#    → add to .env.local:
#      VITE_API_WORKER_URL=https://pepguideiq-api-proxy.YOUR-SUBDOMAIN.workers.dev
#    → restart Vite: npm run dev
#
# 5. Run Supabase migrations through 008_plan_and_stack_photo_security.sql (plan enforcement + stack_photo_r2_key).
#
# Stack photos (R2):
# - Create private bucket "stack-photos"; bind via [[r2_buckets]] below (no public r2.dev required).
# - Users download via Worker GET /stack-photo (Authorization: Bearer).
#
# 6. Stripe: Dashboard → Webhook URL {worker}/stripe/webhook with signing secret as STRIPE_WEBHOOK_SECRET.
#
# 7. Test: submit a query in AI Guide
#    → network request must go to workers.dev (never api.anthropic.com)
#    → response must include usage.queries_today
#    → Entry user: 2nd query same day should return 429
#
# 8. Production: uncomment [vars] ENVIRONMENT + ALLOWED_ORIGIN (exact site origin, not "*")
# ────────────────────────────────────────────────────────────────

name = "pepguideiq-api-proxy"
main = "workers/api-proxy.js"
compatibility_date = "2024-12-01"

# Production: set ENVIRONMENT = "production" and ALLOWED_ORIGIN = "https://your-domain.com"
# [vars]
# ENVIRONMENT = "production"
# ALLOWED_ORIGIN = "https://pepguideiq.com"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "8e4c0ecee5b54a81abf179e58624fd33"
preview_id = "2239fd8dcc6f40fdaf903993ff5a1cd8"

[[r2_buckets]]
binding = "STACK_PHOTOS"
bucket_name = "stack-photos"

# Uncomment to bind a custom domain once pepguideiq.com is on Cloudflare:
# routes = [{ pattern = "api.pepguideiq.com/*", zone_name = "pepguideiq.com" }]
