# ── FIRST DEPLOY CHECKLIST ──────────────────────────────────────
# 1. Set secrets (all required before deploy):
#    npx wrangler secret put ANTHROPIC_API_KEY --config wrangler.worker.toml
#    npx wrangler secret put SUPABASE_URL --config wrangler.worker.toml
#    npx wrangler secret put SUPABASE_ANON_KEY --config wrangler.worker.toml  (same as VITE_SUPABASE_ANON_KEY — used by POST /auth/signup + /auth/password-reset)
#    npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config wrangler.worker.toml
#
# 2. Stripe (when using billing):
#    npx wrangler secret put STRIPE_SECRET_KEY --config wrangler.worker.toml
#    npx wrangler secret put STRIPE_WEBHOOK_SECRET --config wrangler.worker.toml
#    Set Worker vars (not secrets): STRIPE_PRICE_ID_PRO, STRIPE_PRICE_ID_ELITE, STRIPE_PRICE_ID_GOAT — required for POST /stripe/create-subscription
#
# Turnstile (bot check on login/signup — set when using VITE_TURNSTILE_SITE_KEY in the app):
#    npx wrangler secret put TURNSTILE_SECRET_KEY --config wrangler.worker.toml
#
# 3. Deploy:
#    npx wrangler deploy --config wrangler.worker.toml
#
# 4. Copy Worker URL from deploy output
#    → add to .env.local:
#      VITE_API_WORKER_URL=https://pepguideiq-api-proxy.YOUR-SUBDOMAIN.workers.dev
#    → restart Vite: pnpm run dev
#
# Local Worker (wrangler dev):
#   Terminal 1: npx wrangler dev --config wrangler.worker.toml   → default http://localhost:8787
#   .env.local:  VITE_API_WORKER_URL=http://localhost:8787
#   (no trailing slash). Restart Vite after changing env.
#   Same-origin option: VITE_API_WORKER_URL=http://localhost:5173/api-worker
#   with Vite proxy (see vite.config.js) — avoids CORS while dev servers differ.
#
# 5. Run Supabase migrations through 008_plan_and_stack_photo_security.sql (plan enforcement + stack_photo_r2_key).
#
# Stack photos (R2):
# - Create private bucket "stack-photos"; bind via [[r2_buckets]] below (no public r2.dev required).
# - Users download via Worker GET /stack-photo (Authorization: Bearer).
#
# 6. Stripe: Dashboard → Webhook URL {worker}/stripe/webhook with signing secret as STRIPE_WEBHOOK_SECRET.
#
# 7. Test: submit a query in AI Guide
#    → network request must go to workers.dev (never api.anthropic.com)
#    → response must include usage.queries_today
#    → Entry user: 2nd query same day should return 429
#
# 8. Production: uncomment [vars] ENVIRONMENT + ALLOWED_ORIGIN (exact site origin, not "*")
# ────────────────────────────────────────────────────────────────

name = "pepguideiq-api-proxy"
main = "workers/api-proxy.js"
compatibility_date = "2024-12-01"

# Default dev URL: http://127.0.0.1:8787 — set VITE_API_WORKER_URL to match.
[dev]
port = 8787

# Production: set ENVIRONMENT = "production" and ALLOWED_ORIGIN = "https://your-domain.com"
# [vars]
# ENVIRONMENT = "production"
# ALLOWED_ORIGIN = "https://pepguideiq.com"
# STRIPE_PRICE_ID_PRO = "price_1TM98cDtHiMNTdJ0FMxPf94X"
# STRIPE_PRICE_ID_ELITE = "price_1TMCfYDtHiMNTdJ0urEVgoxc"
# STRIPE_PRICE_ID_GOAT = "price_1TMCjnDtHiMNTdJ0CiOHHmQD"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "8e4c0ecee5b54a81abf179e58624fd33"
preview_id = "2239fd8dcc6f40fdaf903993ff5a1cd8"

[[r2_buckets]]
binding = "STACK_PHOTOS"
bucket_name = "stack-photos"

# Uncomment to bind a custom domain once pepguideiq.com is on Cloudflare:
# routes = [{ pattern = "api.pepguideiq.com/*", zone_name = "pepguideiq.com" }]
